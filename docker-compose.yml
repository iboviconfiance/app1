# =============================================================================
# KLAS+ - Stack complète Docker Compose
# =============================================================================
# Lancement : docker compose up --build
# Arrêt     : docker compose down
# Logs      : docker compose logs -f
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: klasplus-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-klasplus}
      POSTGRES_USER: ${DB_USER:-klasplus}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-klasplus_secret}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-klasplus} -d ${DB_NAME:-klasplus}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - klasplus-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Backend API (Node.js / Express / Sequelize)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: klasplus-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-klasplus}
      DB_USER: ${DB_USER:-klasplus}
      DB_PASSWORD: ${DB_PASSWORD:-klasplus_secret}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_use_strong_secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-8080}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - klasplus-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Frontend Flutter Web (Nginx + proxy API)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_URL: /api
    container_name: klasplus-web
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - klasplus-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# -----------------------------------------------------------------------------
# Volumes persistants
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
    name: klasplus-postgres-data
  backend_uploads:
    name: klasplus-uploads

# -----------------------------------------------------------------------------
# Réseau interne
# -----------------------------------------------------------------------------
networks:
  klasplus-network:
    name: klasplus-network
    driver: bridge
